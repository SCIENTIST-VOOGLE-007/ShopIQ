<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>ShopIQ – AI Shopping Companion</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      background:linear-gradient(120deg,#0f172a,#1e293b,#020617);
      color:white;
    }

    /* animated gradient background */

    body::before{
      content:"";
      position:fixed;
      width:200%;
      height:200%;
      background:radial-gradient(circle at 20% 30%,rgba(0,200,255,0.15),transparent 30%),
                 radial-gradient(circle at 80% 70%,rgba(255,0,200,0.15),transparent 30%);
      animation:moveBG 20s infinite linear;
      z-index:-1;
    }

    @keyframes moveBG{
      0%{transform:translate(0,0)}
      50%{transform:translate(-10%,-10%)}
      100%{transform:translate(0,0)}
    }

    /* sparkle particles */

    .sparkle{
      position:fixed;
      width:2px;
      height:2px;
      background:white;
      opacity:0.7;
      animation:twinkle 4s infinite ease-in-out;
    }

    @keyframes twinkle{
      0%,100%{opacity:0.2}
      50%{opacity:1}
    }

  </style>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>

    /* create sparkle particles */

    for(let i=0;i<60;i++){

      const star=document.createElement("div")
      star.className="sparkle"

      star.style.top=Math.random()*100+"vh"
      star.style.left=Math.random()*100+"vw"

      star.style.animationDuration=(2+Math.random()*3)+"s"

      document.body.appendChild(star)

    }

  </script>

</body>

</html>
